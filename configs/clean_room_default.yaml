# Clean Room CFD Simulation -- Default Configuration
#
# Vertical cross-section of a semiconductor clean room with HEPA ceiling
# supply, floor return vents between equipment, and a fume hood with
# exhaust on the right wall. All values in SI units.

domain:
  width: 8.0        # room width, meters
  height: 3.0       # room height, meters
  nx: 200           # grid cells in x direction
  ny: 75            # grid cells in y direction

fluid:
  density: 1.2      # air density, kg/m^3
  viscosity: 1.81e-5  # dynamic viscosity, Pa*s
  temperature: 293.0   # air temperature, K

particles:
  density: 1000.0    # particle material density, kg/m^3
  sizes: [0.1e-6, 0.3e-6, 0.5e-6, 1.0e-6, 5.0e-6]  # diameters, meters
  mean_free_path: 67.0e-9  # mean free path of air, meters
  boundary_layer_thickness: 1.0e-3  # laminar BL thickness for deposition, meters
  hepa_reference:
    diameters: [0.1e-6, 0.3e-6, 0.5e-6, 1.0e-6, 5.0e-6]  # meters
    efficiencies: [0.99999, 0.99970, 0.99990, 0.99999, 0.99999]

solver:
  dt: 0.01           # time step, seconds
  t_end: 60.0        # simulation end time, seconds
  output_interval: 10  # write output every N timesteps
  convergence_tol: 1.0e-6  # SIMPLE iteration convergence tolerance
  max_simple_iter: 500     # max SIMPLE iterations per timestep
  alpha_velocity: 0.7      # velocity under-relaxation factor (0, 1]
  alpha_pressure: 0.3      # pressure under-relaxation factor (0, 1]
  max_pressure_iter: 200   # max Jacobi iterations per SIMPLE step
  pressure_tol: 1.0e-6     # Jacobi convergence tolerance

boundaries:
  hepa_supply:
    type: velocity_inlet
    location: top
    x_start: 0.5
    x_end: 7.5
    velocity: 0.45    # downward laminar flow, m/s

  door:
    type: wall
    location: left
    y_start: 0.0
    y_end: 2.1

  floor_return_1:
    type: pressure_outlet
    location: bottom
    x_start: 0.5
    x_end: 1.25

  floor_return_2:
    type: pressure_outlet
    location: bottom
    x_start: 2.4
    x_end: 2.95

  floor_return_3:
    type: pressure_outlet
    location: bottom
    x_start: 4.6
    x_end: 4.9

  floor_return_4:
    type: pressure_outlet
    location: bottom
    x_start: 5.7
    x_end: 6.3

  hood_exhaust:
    type: pressure_outlet
    location: right
    y_start: 0.9
    y_end: 1.8

obstacles:
  - name: server_rack
    x_start: 1.5
    x_end: 2.3
    y_start: 0.0
    y_end: 2.0

  - name: litho_tool
    x_start: 3.2
    x_end: 4.5
    y_start: 0.0
    y_end: 2.0

  - name: etch_chamber
    x_start: 5.0
    x_end: 5.6
    y_start: 0.0
    y_end: 2.0

  - name: hood_bench
    x_start: 6.4
    x_end: 7.6
    y_start: 0.0
    y_end: 0.9

sensors:
  - name: near_door
    x: 1.0
    y: 1.5

  - name: above_gap_1
    x: 2.7
    y: 2.5

  - name: above_gap_2
    x: 4.8
    y: 2.5

  - name: hood_entry
    x: 6.2
    y: 1.2

# ISO 14644-1 Class 5 limits, particles per cubic meter.
# Keys must be quoted strings to prevent YAML from parsing them as
# floats, which would change the key format (e.g. 0.1e-6 -> 1e-07).
thresholds:
  "0.1e-6": 1.0e+5
  "0.3e-6": 1.02e+4
  "0.5e-6": 3.52e+3
  "1.0e-6": 8.32e+2
  "5.0e-6": 2.93e+1
