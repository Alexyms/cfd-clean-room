name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build C solver
        run: |
          if [ -d "csolver" ] && [ -f "csolver/Makefile" ]; then
            cd csolver && make
          else
            echo "No C solver to build yet. Skipping."
          fi

      - name: Ensure test directories exist
        run: mkdir -p tests reports

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v -m unit --junitxml=reports/unit-results.xml || true

      - name: Run integration tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v -m integration --junitxml=reports/integration-results.xml || true

      - name: Run validation tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v -m validation --junitxml=reports/validation-results.xml || true

      - name: Run all tests with coverage
        run: |
          source .venv/bin/activate
          # Exit code 5 = no tests collected (expected pre-Phase 1)
          # Exit code 1 = test failures (should fail CI)
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=json:reports/coverage.json --junitxml=reports/all-results.xml || {
            exit_code=$?
            if [ $exit_code -eq 5 ]; then
              echo "No tests collected yet. Passing."
              exit 0
            fi
            exit $exit_code
          }

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
